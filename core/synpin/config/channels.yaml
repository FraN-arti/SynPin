# channels.yaml — Communication channels configuration
#
# Channels define how users and agents communicate with the system.
# Each channel can be bound to specific agents or chats.
#
# Supported types: feishu (Lark), whatsapp, telegram, slack, discord, email
# Status: connected | disconnected | error

channels:
  feishu-main:
    name: "Feishu — Основной"
    type: feishu
    status: connected
    # Bot credentials
    app_id: "cli_a5..."
    app_secret: "***"
    verification_token: "***"
    encrypt_key: "***"
    # Connection mode
    mode: websocket  # webhook | websocket
    # Binding: which agent/chat this channel serves
    binding:
      target: "main"          # "main" (system main agent) or "department" or "agent:<id>"
      agent_id: null          # specific agent (null = system default)
      department: null        # department slug
    # Features
    features:
      notifications: true     # send notifications to this channel
      file_upload: true       # allow file attachments
      commands: true          # respond to slash commands
    # Rate limiting
    rate_limit:
      messages_per_minute: 30
    # Last activity
    last_activity: "2026-06-02T10:00:00Z"

