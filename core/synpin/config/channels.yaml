# Available channel types (for "Add channel" wizard)
channel_types:
  feishu:
    name: "Feishu (Lark)"
    icon: "🟢"
    description: "Корпоративный мессенджер Lark/Feishu"
    required_fields:
      - app_id
      - app_secret
      - verification_token
    optional_fields:
      - encrypt_key
    modes:
      - websocket
      - webhook
  whatsapp:
    name: "WhatsApp Business"
    icon: "💬"
    description: "WhatsApp Business API"
    required_fields:
      - phone_number_id
      - access_token
      - verify_token
    optional_fields: []
    modes:
      - webhook
  telegram:
    name: "Telegram"
    icon: "✈️"
    description: "Telegram Bot API"
    required_fields:
      - bot_token
    optional_fields: []
    modes:
      - polling
      - webhook
  slack:
    name: "Slack"
    icon: "💜"
    description: "Slack Bot"
    required_fields:
      - bot_token
      - signing_secret
    optional_fields: []
    modes:
      - websocket
  discord:
    name: "Discord"
    icon: "🎮"
    description: "Discord Bot"
    required_fields:
      - bot_token
    optional_fields: []
    modes:
      - websocket
  email:
    name: "Email"
    icon: "📧"
    description: "Email через IMAP/SMTP"
    required_fields:
      - imap_host
      - imap_port
      - smtp_host
      - smtp_port
      - username
      - password
    optional_fields: []
    modes:
      - polling

# Binding targets (who can receive messages from channels)
binding_targets:
  - slug: "main"
    name: "Основной агент"
    description: "Главный агент системы (по умолчанию)"
  - slug: "department"
    name: "Департамент"
    description: "Все агенты указанного департамента"
  - slug: "agent"
    name: "Конкретный агент"
    description: "Привязка к одному агенту"
