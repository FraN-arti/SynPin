context_window:
  default: 128000
compaction:
  enabled: true
  trigger_percent: 80
  keep_recent: 10
  strategy: summarize
  summary_max_tokens: 500
sessions:
  auto_reset:
    enabled: true
    mode: daily
    reset_time: 00:00
    interval_hours: 24
  archive_on_reset: true
  max_history: 100
agent_memory:
  enabled: true
  path: agents/{dept}/{agent_id}/MEMORY.md
  auto_save:
    on_session_end: true
    on_error: true
    on_decision: true
    interval_minutes: 30
  categories:
  - slug: lessons
    name: Уроки
    description: Ошибки и выводы
  - slug: decisions
    name: Решения
    description: Активные и принятые решения
  - slug: preferences
    name: Предпочтения
    description: Стиль работы, привычки
  - slug: context
    name: Контекст
    description: Текущие задачи, проекты
  session:
    max_sessions_per_agent: 50
    session_summary: true
    summary_max_length: 500
    include_in_context:
    - last_5_sessions
    - active_decisions
    - relevant_lessons
team_memory:
  enabled: true
  path: shared/MEMORY.md
  auto_share:
    new_patterns: true
    architecture_decisions: true
    best_practices: true
    bugs_found: true
  categories:
  - slug: patterns
    name: Паттерны
    description: Архитектурные и кодовые паттерны
  - slug: adrs
    name: ADR
    description: Architecture Decision Records
  - slug: best-practices
    name: Лучшие практики
    description: Рекомендации и гайдлайны
  - slug: bugs
    name: Баг-база
    description: Известные баги и их решения
  - slug: onboarding
    name: Онбординг
    description: Инструкции для новых агентов
system_memory:
  enabled: true
  index:
    conversations: true
    kanban_tasks: true
    forum_posts: true
    code_changes: false
  fts5:
    enabled: true
    searchable_fields:
    - message_content
    - task_title
    - task_description
    - forum_title
    - forum_content
    - memory_entries
    weights:
      exact_match: 10
      word_match: 5
      prefix_match: 3
      recency_boost: 2
  vector_search:
    enabled: false
    provider: null
    model: null
    dimension: null
    use_for:
    - semantic_similarity
    - fuzzy_recall
lifecycle:
  cleanup:
    enabled: true
    archive_sessions_after_days: 90
    delete_archived_after_days: 365
    compact_memory_threshold: 50
  retention:
    active_decisions: keep
    lessons: keep
    session_summaries: 90
    forum_posts: 365
