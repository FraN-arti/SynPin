# Memory configuration
# Global settings for agent memory system

context_window:
  default: 128000  # Default context window size in tokens

# Compaction — when context exceeds limit, compress old messages
compaction:
  enabled: true
  trigger_percent: 80   # Compact when context is 80% full
  keep_recent: 10       # Keep last N messages intact
  strategy: truncate    # "truncate" (fast) or "summarize" (LLM-powered, coming soon)
  summary_max_tokens: 500  # Max tokens for summarize strategy

# Memory Provider — where agents store long-term memory
# Options: built-in | byterover | hindsight | holographic | honcho | mem0 | openviking | retaindb | supermemory
memory_provider:
  provider: built-in    # Default: MEMORY.md + USER.md files
  api_key: ""           # API key for cloud providers (if needed)
  endpoint: ""          # Custom endpoint for self-hosted providers
  max_chars: 10000      # Max characters per memory entry
  auto_refactor: false  # Auto-refactor memory entries (coming soon)

# Agent-level memory limits — exposed in the UI under "Настройка памяти"
memory:
  enabled: true
  max_chars: 2200         # MEMORY.md (agent notes) per-agent limit
  max_chars_user: 1375    # USER.md (shared user profile) limit
  auto_refactor: false    # On overflow: LLM-summarize and retry, instead of failing
