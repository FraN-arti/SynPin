# Web search provider configuration.
#
# Brave Search API is the recommended default — free 2 000 queries/month.
# Sign up at:
#   https://brave.com/search/api/
#
# Other providers (Tavily, EXA, Bing, etc.) require their own API keys.
# Set "enabled: true" and paste your key below to activate a provider.

providers:
  brave:
    enabled: false
    api_key: ""          # paste your Brave Search API key here

