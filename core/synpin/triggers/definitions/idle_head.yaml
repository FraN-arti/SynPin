type: idle_head
name: "Бездействие главы отдела"
description: "Срабатывает если глава отдела не отвечал N минут"
category: state
icon: clock
color: orange
version: 1
config_schema:
  - name: idle_minutes
    type: number
    default: 30
    min: 1
    label: "Минут без ответа"
  - name: otdel_filter
    type: string
    default: ""
    label: "ID отдела (пусто = все)"
action_types:
  - agent_prompt
  - log
  - notify_user
