type: idle_head
name: "Бездействие главы отдела"
description: "Срабатывает если глава отдела не отвечала N минут"
category: state
icon: clock
color: orange
version: 3
config_schema:
  - name: idle_minutes
    type: number
    default: 30
    min: 1
    label: "Минут тишины"
# Optional global toggle surfaced in the UI as a master switch.
# Plugins without this field don't show the toggle in Settings.
global_toggle:
  enabled_by_default: true
action_types:
  - agent_prompt
