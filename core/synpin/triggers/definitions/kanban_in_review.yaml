type: kanban_in_review
name: "Долгое ревью"
description: "Срабатывает если задача в проверке дольше порогового времени"
category: state
icon: eye
color: yellow
version: 1
config_schema:
  - name: idle_minutes
    type: number
    default: 60
    min: 5
    label: "Минут в проверке"
# Optional global toggle surfaced in the UI as a master switch.
# Plugins without this field don't show the toggle in Settings.
global_toggle:
  enabled_by_default: true

action_types:
  - agent_prompt
  - log
