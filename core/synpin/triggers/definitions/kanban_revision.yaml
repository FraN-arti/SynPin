type: kanban_revision
name: "Застряли в доработке"
description: "Срабатывает если задача в доработке дольше порогового времени"
category: state
icon: refresh-cw
color: yellow
version: 1
config_schema:
  - name: idle_minutes
    type: number
    default: 60
    min: 5
    label: "Минут в доработке"
# Optional global toggle surfaced in the UI as a master switch.
# Plugins without this field don't show the toggle in Settings.
global_toggle:
  enabled_by_default: true

action_types:
  - agent_prompt
  - log
