type: kanban_stuck
name: "Зависшие задачи канбана"
description: "Срабатывает если задача не двигалась больше порогового времени"
category: state
icon: alert-clock
color: orange
version: 1
config_schema:
  - name: idle_minutes
    type: number
    default: 120
    min: 5
    label: "Минут без движения"
# Optional global toggle surfaced in the UI as a master switch.
# Plugins without this field don't show the toggle in Settings.
global_toggle:
  enabled_by_default: true

action_types:
  - agent_prompt
  - log
  - notify_user
