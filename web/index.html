<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SynPin — Multi-Agent Framework</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      // Apply theme BEFORE React renders to prevent flash-of-dark-theme
      (function() {
        try {
          var raw = localStorage.getItem('synpin_theme');
          if (!raw) return;
          var data = JSON.parse(raw);
          var root = document.documentElement;
          // Apply theme class
          if (data.name === 'light') {
            root.classList.add('light-theme');
          } else if (data.name === 'dark-oled') {
            root.classList.add('oled-theme');
          }
          // Apply TweakCN custom vars
          if (data.vars) {
            Object.keys(data.vars).forEach(function(key) {
              root.style.setProperty(key, data.vars[key]);
            });
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
